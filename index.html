<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>СМЕНА — Напитки</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F5F0E8;
    --dark: #1C1A17;
    --gold: #C4973A;
    --gold-light: #E8C97A;
    --muted: #6B6355;
    --border: rgba(196,151,58,0.25);
    --card-bg: rgba(255,252,245,0.85);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--dark); min-height:100vh; }
  body::before {
    content:''; position:fixed; inset:0;
    background: radial-gradient(ellipse 80% 60% at 20% 10%,rgba(196,151,58,0.08) 0%,transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 90%,rgba(139,109,56,0.06) 0%,transparent 60%);
    pointer-events:none; z-index:0;
  }

  /* ══ ЗАГРУЗОЧНЫЙ ЭКРАН ══ */
  #loader {
    position:fixed; inset:0; z-index:9999;
    background:var(--cream);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    transition:opacity 0.6s ease, transform 0.6s ease;
  }
  #loader.hide { opacity:0; transform:scale(1.03); pointer-events:none; }

  .loader-logo {
    margin-bottom:3rem;
    animation:logoIn 0.7s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes logoIn {
    from { opacity:0; transform:translateY(20px) scale(0.94); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }
  .loader-logo img {
    width:260px; height:auto; display:block;

  }

  .loader-bar-wrap {
    width:260px;
    animation:fadeInBar 0.4s 0.4s both;
  }
  @keyframes fadeInBar { from{opacity:0} to{opacity:1} }
  .loader-label {
    font-size:0.68rem; letter-spacing:0.2em;
    text-transform:uppercase; color:rgba(196,151,58,0.6);
    margin-bottom:10px; text-align:center;
  }
  .loader-track {
    width:100%; height:2px;
    background:rgba(196,151,58,0.15);
    border-radius:99px; overflow:hidden;
  }
  .loader-fill {
    height:100%; width:0%;
    background:linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius:99px;
    transition:width 0.08s linear;
    box-shadow:0 0 8px rgba(196,151,58,0.5);
  }
  .loader-pct {
    text-align:right; font-size:0.62rem;
    color:rgba(196,151,58,0.4);
    margin-top:6px; font-variant-numeric:tabular-nums;
  }

  /* ══ ОСНОВНОЙ САЙТ ══ */
  #app { opacity:0; transition:opacity 0.5s ease; }
  #app.visible { opacity:1; }

  header {
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:2rem;
    padding:2rem 2.5rem;
    position:relative; z-index:1;
    border-bottom:1px solid var(--border);
  }
  .header-logo {
    display:block; width:160px; height:auto;
    flex-shrink:0;
  }
  .header-right {
    text-align:right;
  }
  .header-title {
    font-family:'Playfair Display',serif;
    font-size:clamp(1.4rem,3vw,2rem);
    font-weight:400;
    font-style:italic;
    letter-spacing:-0.02em;
    line-height:1.15;
    color:var(--dark);
  }
  .header-title em {
    font-style:italic;
    color:var(--gold);
  }
  .subtitle {
    margin-top:0.4rem; font-size:0.75rem;
    color:var(--muted); font-weight:300;
    letter-spacing:0.08em; text-transform:uppercase;
  }

  .filters {
    display:flex; justify-content:center; gap:8px; flex-wrap:wrap;
    padding:1.5rem 1.5rem 0; position:relative; z-index:1;
  }
  .filter-btn {
    padding:6px 16px; border:1px solid var(--border);
    border-radius:99px; background:transparent;
    color:var(--muted); font-family:'DM Sans',sans-serif;
    font-size:0.8rem; cursor:pointer; transition:all 0.2s;
    letter-spacing:0.03em;
  }
  .filter-btn:hover,.filter-btn.active {
    background:var(--gold); border-color:var(--gold); color:white;
  }

  main { max-width:640px; margin:0 auto; padding:1.5rem 1rem 4rem; position:relative; z-index:1; }

  .last-updated { text-align:center; font-size:0.72rem; color:var(--muted); margin-bottom:1rem; }

  .loading { text-align:center; padding:4rem 2rem; color:var(--muted); }
  .loading-spinner {
    width:32px; height:32px;
    border:2px solid var(--border); border-top-color:var(--gold);
    border-radius:50%; animation:spin 0.8s linear infinite;
    margin:0 auto 1rem;
  }
  @keyframes spin { to{transform:rotate(360deg);} }

  .error-box {
    background:#FAEBEB; border:1px solid #EDB8B8; border-radius:12px;
    padding:1.25rem; color:#8A2A2A; font-size:0.875rem; text-align:center;
  }

  .drink-card {
    background:var(--card-bg); border:1px solid var(--border);
    border-radius:16px; padding:1.5rem; margin-bottom:1rem;
    transition:transform 0.2s,box-shadow 0.2s; backdrop-filter:blur(4px);
  }
  .drink-card:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(196,151,58,0.12); }
  .drink-card.out-of-stock { opacity:0.45; filter:grayscale(0.4); }

  .card-top { display:flex; justify-content:space-between; align-items:flex-start; gap:1rem; margin-bottom:0.75rem; }
  .drink-name { font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:400; line-height:1.3; flex:1; }
  .drink-price { font-size:1.2rem; font-weight:500; color:var(--gold); white-space:nowrap; }
  .drink-desc { font-size:0.9rem; color:var(--muted); line-height:1.7; margin-bottom:1rem; font-weight:300; }

  .card-footer { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .chip      { font-size:0.72rem; padding:3px 10px; border-radius:99px; border:1px solid var(--border); color:var(--muted); }
  .chip-alc  { font-size:0.72rem; padding:3px 10px; border-radius:99px; font-weight:500; background:#F0EBF8; color:#5A3A8A; border:1px solid #D4C0EE; }
  .chip-zero { font-size:0.72rem; padding:3px 10px; border-radius:99px; font-weight:500; background:#EAF4E5; color:#2A6B35; border:1px solid #B3D9B8; }
  .chip-vol  { font-size:0.72rem; padding:3px 10px; border-radius:99px; background:rgba(196,151,58,0.1); color:var(--muted); border:1px solid rgba(196,151,58,0.3); }

  .sweet-chip { font-size:0.72rem; padding:3px 10px; border-radius:99px; font-weight:500; }
  .sweet-dry       { background:#EBF3FA; color:#2A5F8A; border:1px solid #BAD4EC; }
  .sweet-semidry   { background:#EAF4E5; color:#2A6B35; border:1px solid #B3D9B8; }
  .sweet-semisweet { background:#FEF5E6; color:#8A5A1A; border:1px solid #F0CC84; }
  .sweet-sweet     { background:#FDEEF4; color:#8A2A55; border:1px solid #EDB8D2; }

  .avail { margin-left:auto; font-size:0.72rem; padding:3px 10px; border-radius:99px; font-weight:500; }
  .avail-ok  { background:#EAF4E5; color:#2A6B35; }
  .avail-low { background:#FEF5E6; color:#8A5A1A; }
  .avail-out { background:#FAEBEB; color:#8A2A2A; }

  .search-wrap {
    max-width:640px;
    margin:1.25rem auto 0;
    padding:0 1rem;
    position:relative; z-index:1;
  }
  .search-input {
    width:100%;
    padding:10px 16px 10px 40px;
    border:1px solid var(--border);
    border-radius:99px;
    background:var(--card-bg);
    font-family:'DM Sans',sans-serif;
    font-size:0.9rem;
    color:var(--dark);
    outline:none;
    transition:border-color 0.2s, box-shadow 0.2s;
    backdrop-filter:blur(4px);
  }
  .search-input:focus {
    border-color:var(--gold);
    box-shadow:0 0 0 3px rgba(196,151,58,0.12);
  }
  .search-input::placeholder { color:var(--muted); }
  .search-icon {
    position:absolute; left:28px; top:50%;
    transform:translateY(-50%);
    color:var(--muted); font-size:15px;
    pointer-events:none;
  }
  .search-clear {
    position:absolute; right:28px; top:50%;
    transform:translateY(-50%);
    background:none; border:none; cursor:pointer;
    color:var(--muted); font-size:16px;
    display:none; line-height:1;
  }

  .empty-state {
    text-align:center; padding:4rem 2rem; color:var(--muted);
    font-family:'Playfair Display',serif; font-style:italic; font-size:1.1rem;
  }
  footer {
    text-align:center; padding:1.5rem; font-size:0.75rem;
    color:var(--muted); border-top:1px solid var(--border);
    position:relative; z-index:1;
  }
  @media(max-width:480px) {
    header { padding:2rem 1rem 1.5rem; }
    .drink-card { padding:1.25rem; }
    .drink-name { font-size:1.05rem; }
    .header-logo { width:160px; }
    .loader-logo img { width:200px; }
  }
</style>
</head>

    <div class="header-right">
      <div class="header-title">Ассортимент <em>холодильника</em></div>
      <p class="subtitle">Оплата у продавца · Уточняйте наличие</p>
    </div>
  </header>

  <div class="filters">
    <button class="filter-btn active" onclick="filterBy('all',this)">Все</button>
    <button class="filter-btn" onclick="filterBy('nonalc',this)">Безалкогольные</button>
    <button class="filter-btn" onclick="filterBy('dry',this)">Сухой</button>
    <button class="filter-btn" onclick="filterBy('semidry',this)">Полусухой</button>
    <button class="filter-btn" onclick="filterBy('semisweet',this)">Полусладкий</button>
    <button class="filter-btn" onclick="filterBy('sweet',this)">Сладкий</button>
  </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search-input" placeholder="Поиск напитка..." oninput="onSearch(this.value)">
    <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
  </div>

  <main>
    <div id="last-updated" class="last-updated"></div>
    <div id="drink-list">
      <div class="loading"><div class="loading-spinner"></div>Загружаем меню...</div>
    </div>
  </main>

  <footer>СМЕНА · Для оплаты обратитесь к продавцу</footer>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbzftFYgeeArKivEk5DW9oHAoNjMhqYm66ai2gIlbotGuf-MR6Zo5TRHlSh8OTHH8pgT/exec';
const sweetLabels = { dry:'Сухой', semidry:'Полусухой', semisweet:'Полусладкий', sweet:'Сладкий' };
const sweetClass  = { dry:'sweet-dry', semidry:'sweet-semidry', semisweet:'sweet-semisweet', sweet:'sweet-sweet' };
let allDrinks = [];
let currentFilter = 'all';
let searchQuery = '';

const fill   = document.getElementById('loader-fill');
const pct    = document.getElementById('loader-pct');
const loader = document.getElementById('loader');
const app    = document.getElementById('app');

let progress = 0;
const ticker = setInterval(() => {
  const step = progress < 55 ? 4 : progress < 78 ? 1.5 : 0.25;
  progress = Math.min(progress + step, 91);
  fill.style.width = progress + '%';
  pct.textContent  = Math.floor(progress) + '%';
}, 50);

function finishLoader() {
  clearInterval(ticker);
  fill.style.transition = 'width 0.4s ease';
  fill.style.width = '100%';
  pct.textContent = '100%';
  setTimeout(() => {
    loader.classList.add('hide');
    app.classList.add('visible');
  }, 450);
}

async function loadDrinks() {
  try {
    const res  = await fetch(API + '?t=' + Date.now());
    const data = await res.json();
    allDrinks  = data.map(d => ({
      ...d,
      qty:    Number(d.qty),
      price:  Number(d.price),
      abv:    String(d.abv ?? ''),
      volume: String(d.volume ?? '')
    }));
    const now = new Date().toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' });
    document.getElementById('last-updated').textContent = 'Обновлено в ' + now;
    render();
  } catch(e) {
    document.getElementById('drink-list').innerHTML =
      '<div class="error-box">Не удалось загрузить меню. Обновите страницу.</div>';
  } finally {
    finishLoader();
  }
}

function filterBy(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function onSearch(val) {
  searchQuery = val.trim().toLowerCase();
  document.getElementById('search-clear').style.display = val ? 'block' : 'none';
  render();
}

function clearSearch() {
  searchQuery = '';
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').style.display = 'none';
  render();
}

function render() {
  const list = document.getElementById('drink-list');
  let filtered = allDrinks;
  if (currentFilter === 'nonalc') filtered = allDrinks.filter(d => d.abv === '0' || d.abv === '');
  else if (currentFilter !== 'all') filtered = allDrinks.filter(d => d.sweet === currentFilter);
  if (searchQuery) filtered = filtered.filter(d =>
    d.name?.toLowerCase().includes(searchQuery) ||
    d.desc?.toLowerCase().includes(searchQuery) ||
    d.producer?.toLowerCase().includes(searchQuery) ||
    d.country?.toLowerCase().includes(searchQuery)
  );

  const inStock  = filtered.filter(d => d.qty > 0).sort((a,b) => a.name.localeCompare(b.name));
  const outStock = filtered.filter(d => d.qty <= 0).sort((a,b) => a.name.localeCompare(b.name));
  if (!inStock.length && !outStock.length) {
    list.innerHTML = '<div class="empty-state">Ничего не найдено</div>'; return;
  }

  list.innerHTML = [...inStock, ...outStock].map(d => {
    const isZero    = d.abv === '0' || d.abv === '';
    const abvChip   = isZero ? '<span class="chip-zero">Безалкогольный</span>'
                    : d.abv ? `<span class="chip-alc">${d.abv}% алк.</span>` : '';
    const volChip   = d.volume && d.volume !== '0' ? `<span class="chip-vol">${d.volume} мл</span>` : '';
    const sweetChip = d.sweet ? `<span class="sweet-chip ${sweetClass[d.sweet]}">${sweetLabels[d.sweet]}</span>` : '';
    const avail = d.qty <= 0
      ? '<span class="avail avail-out">Нет в наличии</span>'
      : d.qty <= 3 ? `<span class="avail avail-low">Осталось ${d.qty} шт.</span>`
      : '<span class="avail avail-ok">В наличии</span>';
    return `
    <div class="drink-card ${d.qty <= 0 ? 'out-of-stock' : ''}">
      <div class="card-top">
        <div class="drink-name">${d.name}</div>
        <div class="drink-price">${d.price} ₽</div>
      </div>
      ${d.desc ? `<p class="drink-desc">${d.desc}</p>` : ''}
      <div class="card-footer">
        ${d.country ? `<span class="chip">📍 ${d.country}</span>` : ''}
        ${volChip}${abvChip}${sweetChip}${avail}
      </div>
    </div>`;
  }).join('');
}

setTimeout(loadDrinks, 600);
setInterval(loadDrinks, 5 * 60 * 1000);
</script>
</body>
</html>
