<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Управление — Холодильник</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --cream:#F5F0E8; --dark:#1C1A17; --gold:#C4973A; --muted:#6B6355; --border:rgba(196,151,58,0.25); --danger:#C44040; --white:#FFFCF5; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--dark); min-height:100vh; }

  header { background:var(--dark); color:var(--cream); padding:1rem 1.5rem; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  header h1 { font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:400; }
  .view-link { text-decoration:none; font-size:0.8rem; color:var(--gold); border:1px solid rgba(196,151,58,0.4); padding:6px 14px; border-radius:99px; }

  .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--border); border-bottom:1px solid var(--border); }
  .stat { background:var(--white); padding:1.25rem 1rem; text-align:center; }
  .stat-num { font-family:'Playfair Display',serif; font-size:2rem; font-weight:600; color:var(--gold); line-height:1; }
  .stat-label { font-size:0.7rem; color:var(--muted); margin-top:4px; text-transform:uppercase; letter-spacing:0.06em; }

  main { max-width:720px; margin:0 auto; padding:1.5rem 1rem 4rem; }
  .section-label { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); margin-bottom:0.75rem; padding-bottom:0.5rem; border-bottom:1px solid var(--border); }

  .add-form { background:var(--white); border:1px solid var(--border); border-radius:16px; padding:1.5rem; margin-bottom:2rem; }
  .add-form h2 { font-family:'Playfair Display',serif; font-size:1.1rem; font-weight:400; margin-bottom:1rem; }
  .form-grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:8px; }
  .form-grid-4 { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:8px; margin-bottom:8px; }
  .form-grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }
  input, select, textarea { width:100%; padding:9px 12px; border:1px solid var(--border); border-radius:10px; font-family:'DM Sans',sans-serif; font-size:0.875rem; background:var(--cream); color:var(--dark); outline:none; transition:border-color 0.15s; }
  input:focus, select:focus, textarea:focus { border-color:var(--gold); }
  textarea { resize:vertical; min-height:80px; }
  .btn { width:100%; padding:11px; background:var(--dark); color:var(--cream); border:none; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:0.9rem; font-weight:500; cursor:pointer; margin-top:4px; }

  .search-wrap { margin-bottom:1rem; position:relative; }
  .search-wrap input { padding-left:36px; }
  .search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--muted); }

  .admin-item { background:var(--white); border:1px solid var(--border); border-radius:14px; padding:1.25rem; margin-bottom:8px; display:flex; gap:1rem; align-items:flex-start; }
  .admin-item.low-stock { border-color:rgba(196,151,58,0.6); }
  .admin-item.no-stock { opacity:0.5; }
  .item-info { flex:1; min-width:0; }
  .item-name { font-family:'Playfair Display',serif; font-size:1rem; font-weight:400; margin-bottom:4px; }
  .item-desc { font-size:0.8rem; color:var(--muted); line-height:1.6; margin-bottom:6px; font-weight:300; }
  .item-meta { font-size:0.75rem; color:var(--muted); display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
  .pill { padding:2px 8px; border-radius:99px; font-size:0.7rem; font-weight:500; }
  .pill-alc  { background:#F0EBF8; color:#5A3A8A; }
  .pill-zero { background:#EAF4E5; color:#2A6B35; }
  .pill-vol  { background:#F5F0E8; color:#6B6355; border:1px solid rgba(196,151,58,0.3); }
  .sweet-dry       { background:#EBF3FA; color:#2A5F8A; }
  .sweet-semidry   { background:#EAF4E5; color:#2A6B35; }
  .sweet-semisweet { background:#FEF5E6; color:#8A5A1A; }
  .sweet-sweet     { background:#FDEEF4; color:#8A2A55; }

  .item-controls { display:flex; flex-direction:column; align-items:flex-end; gap:10px; min-width:100px; }
  .item-price { font-size:1.1rem; font-weight:500; color:var(--gold); }
  .qty-row { display:flex; align-items:center; gap:8px; }
  .qty-btn { width:30px; height:30px; border:1px solid var(--border); border-radius:8px; background:var(--cream); color:var(--dark); font-size:1.1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .qty-num { font-size:1rem; font-weight:500; min-width:24px; text-align:center; }
  .qty-num.danger { color:var(--danger); }
  .delete-btn { background:none; border:none; cursor:pointer; color:var(--danger); font-size:0.75rem; padding:2px 6px; border-radius:6px; }

  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--dark); color:var(--cream); padding:10px 20px; border-radius:10px; font-size:0.875rem; opacity:0; transition:opacity 0.25s; pointer-events:none; z-index:999; white-space:nowrap; }
  .toast.show { opacity:1; }
  .empty { text-align:center; padding:3rem; color:var(--muted); font-style:italic; }

  @media(max-width:500px) {
    .form-grid-3, .form-grid-4 { grid-template-columns:1fr 1fr; }
    .form-grid-3 > *:last-child, .form-grid-4 > *:last-child { grid-column:1/-1; }
  }
</style>
</head>
<body>
<header>
  <h1>🍾 Управление холодильником</h1>
  <a href="index.html" class="view-link" target="_blank">Меню ↗</a>
</header>

<div class="stats">
  <div class="stat"><div class="stat-num" id="s-total">0</div><div class="stat-label">Позиций</div></div>
  <div class="stat"><div class="stat-num" id="s-qty">0</div><div class="stat-label">Всего штук</div></div>
  <div class="stat"><div class="stat-num" id="s-low">0</div><div class="stat-label">Заканчивается</div></div>
</div>

<main>
  <div class="add-form">
    <h2>+ Добавить напиток</h2>
    <div class="form-grid-3">
      <input id="f-name"     placeholder="Название" />
      <input id="f-price"    placeholder="Цена (₽)" type="number" min="0" />
      <input id="f-qty"      placeholder="Количество" type="number" min="0" />
    </div>
    <div class="form-grid-4">
      <input id="f-volume"   placeholder="Объём (мл)" type="number" min="0" />
      <input id="f-abv"      placeholder="Алк. % (0 = безалк.)" type="number" min="0" max="10" step="0.1" />
      <input id="f-country"  placeholder="Страна / регион" />
      <input id="f-producer" placeholder="Производитель" />
    </div>
    <div class="form-grid-2" style="margin-bottom:8px">
      <select id="f-sweet">
        <option value="">— Сладость (для сидра) —</option>
        <option value="dry">Сухой</option>
        <option value="semidry">Полусухой</option>
        <option value="semisweet">Полусладкий</option>
        <option value="sweet">Сладкий</option>
      </select>
      <input id="f-placeholder" placeholder="(необязательно)" disabled style="opacity:0.3" />
    </div>
    <div style="margin-bottom:8px">
      <textarea id="f-desc" placeholder="Описание: вкус, аромат, история, способ производства..."></textarea>
    </div>
    <button class="btn" onclick="addDrink()">Добавить позицию</button>
  </div>

  <div class="section-label">Напитки в холодильнике</div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input placeholder="Поиск по названию..." oninput="renderAdmin(this.value)" />
  </div>
  <div id="admin-list"></div>
</main>
<div class="toast" id="toast"></div>

<script>
const sweetLabels = { dry:'Сухой', semidry:'Полусухой', semisweet:'Полусладкий', sweet:'Сладкий' };
const sweetClass  = { dry:'sweet-dry', semidry:'sweet-semidry', semisweet:'sweet-semisweet', sweet:'sweet-sweet' };
let nextId = 200;

function load() {
  try { return JSON.parse(localStorage.getItem('cider_drinks')||'null') || getDefaults(); }
  catch(e) { return getDefaults(); }
}
function save(d) { localStorage.setItem('cider_drinks', JSON.stringify(d)); }

function getDefaults() {
  return [
    { id:1, name:'Cidre Brut — Eric Bordelet', price:380, qty:8, country:'Франция, Нормандия', producer:'Eric Bordelet', sweet:'dry', abv:'5', volume:'750', desc:'Классический нормандский сидр из яблок сорта Bedan и Frequin Rouge. Выдержан на осадке 6 месяцев. Во вкусе — зелёное яблоко, лимон, лёгкая терпкость.' },
    { id:2, name:'Asturian Gold — El Gaitero', price:290, qty:5, country:'Испания, Астурия', producer:'El Gaitero', sweet:'semidry', abv:'6', volume:'500', desc:'Игристый сидр из астурийских яблок. Традиционный метод производства с бутылочным брожением. Золотистый цвет, аромат спелой груши и мёда.' },
    { id:3, name:'Somerset Rosé — Burrow Hill', price:340, qty:3, country:'Англия, Сомерсет', producer:'Burrow Hill', sweet:'semisweet', abv:'4.5', volume:'500', desc:'Розовый сидр из смеси красных яблок. Мягкий, фруктовый, с нотами малины и земляники.' },
    { id:4, name:"Keeved Cider — Oliver's", price:420, qty:2, country:'Англия, Херефордшир', producer:"Oliver's", sweet:'sweet', abv:'3.5', volume:'750', desc:'Редкий кивированный сидр — натуральная сладость без добавления сахара. Нотки карамели и ванили.' },
    { id:5, name:'Somersby Apple', price:180, qty:12, country:'Дания', producer:'Somersby', sweet:'semisweet', abv:'4.5', volume:'330', desc:'Лёгкий освежающий сидр. Мягкий вкус, умеренная газация.' },
    { id:6, name:'Яблочный сок — безалкогольный', price:150, qty:6, country:'Россия', producer:'Сады Придонья', sweet:'', abv:'0', volume:'1000', desc:'Натуральный яблочный сок прямого отжима без добавления сахара и консервантов.' },
  ];
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function updateStats() {
  const d = load();
  document.getElementById('s-total').textContent = d.length;
  document.getElementById('s-qty').textContent = d.reduce((s,x)=>s+x.qty,0);
  document.getElementById('s-low').textContent = d.filter(x=>x.qty>0&&x.qty<=3).length;
}

function renderAdmin(search='') {
  const drinks = load();
  const list = document.getElementById('admin-list');
  const f = drinks.filter(d => d.name.toLowerCase().includes(search.toLowerCase()));
  if (!f.length) { list.innerHTML='<div class="empty">Ничего не найдено</div>'; updateStats(); return; }

  list.innerHTML = f.map(d => {
    const isZero = d.abv==='0'||d.abv===0||d.abv==='';
    const abvPill = isZero
      ? '<span class="pill pill-zero">Безалкогольный</span>'
      : d.abv ? `<span class="pill pill-alc">${d.abv}% алк.</span>` : '';
    const volPill = d.volume ? `<span class="pill pill-vol">${d.volume} мл</span>` : '';
    const sweetPill = d.sweet ? `<span class="pill ${sweetClass[d.sweet]}">${sweetLabels[d.sweet]}</span>` : '';
    return `
    <div class="admin-item ${d.qty===0?'no-stock':d.qty<=3?'low-stock':''}">
      <div class="item-info">
        <div class="item-name">${d.name}</div>
        ${d.desc?`<div class="item-desc">${d.desc}</div>`:''}
        <div class="item-meta">
          ${d.country?`📍 ${d.country}`:''}
          ${d.producer?`· ${d.producer}`:''}
          ${volPill}${abvPill}${sweetPill}
        </div>
      </div>
      <div class="item-controls">
        <div class="item-price">${d.price} ₽</div>
        <div class="qty-row">
          <button class="qty-btn" onclick="changeQty(${d.id},-1)">−</button>
          <span class="qty-num ${d.qty<=2?'danger':''}">${d.qty}</span>
          <button class="qty-btn" onclick="changeQty(${d.id},1)">+</button>
        </div>
        <button class="delete-btn" onclick="deleteDrink(${d.id})">✕ удалить</button>
      </div>
    </div>`;
  }).join('');
  updateStats();
}

function changeQty(id, delta) {
  const drinks = load();
  const d = drinks.find(x=>x.id===id);
  if (!d) return;
  d.qty = Math.max(0, d.qty+delta);
  save(drinks);
  renderAdmin(document.querySelector('input[placeholder*="Поиск"]').value);
}

function deleteDrink(id) {
  if (!confirm('Удалить эту позицию?')) return;
  save(load().filter(x=>x.id!==id));
  renderAdmin(document.querySelector('input[placeholder*="Поиск"]').value);
  toast('Позиция удалена');
}

function addDrink() {
  const name     = document.getElementById('f-name').value.trim();
  const price    = parseInt(document.getElementById('f-price').value);
  const qty      = parseInt(document.getElementById('f-qty').value);
  const volume   = document.getElementById('f-volume').value.trim();
  const abv      = document.getElementById('f-abv').value.trim();
  const country  = document.getElementById('f-country').value.trim();
  const producer = document.getElementById('f-producer').value.trim();
  const sweet    = document.getElementById('f-sweet').value;
  const desc     = document.getElementById('f-desc').value.trim();

  if (!name||isNaN(price)||isNaN(qty)) { toast('⚠️ Заполните название, цену и количество'); return; }

  const drinks = load();
  drinks.push({ id:nextId++, name, price, qty, volume, abv, country, producer, sweet, desc });
  save(drinks);
  ['f-name','f-price','f-qty','f-volume','f-abv','f-country','f-producer','f-desc'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-sweet').value='';
  renderAdmin();
  toast('✓ Напиток добавлен');
}

renderAdmin();
</script>
</body>
</html>
