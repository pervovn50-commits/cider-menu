<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Управление — Холодильник</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F5F0E8;
    --dark: #1C1A17;
    --gold: #C4973A;
    --muted: #6B6355;
    --border: rgba(196,151,58,0.25);
    --danger: #C44040;
    --success: #3A8A4A;
    --white: #FFFCF5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--dark);
    min-height: 100vh;
  }

  header {
    background: var(--dark);
    color: var(--cream);
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    font-weight: 400;
    letter-spacing: -0.01em;
  }
  header span {
    font-size: 0.75rem;
    color: rgba(245,240,232,0.5);
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }
  .stat {
    background: var(--white);
    padding: 1.25rem 1rem;
    text-align: center;
  }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 600;
    color: var(--gold);
    line-height: 1;
  }
  .stat-label {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  main { max-width: 720px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

  .section-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 0.75rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  .add-form {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 2rem;
  }
  .add-form h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 400;
    margin-bottom: 1rem;
    color: var(--dark);
  }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  input, select, textarea {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    background: var(--cream);
    color: var(--dark);
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--gold);
  }
  textarea { resize: vertical; min-height: 80px; }
  .btn {
    width: 100%;
    padding: 11px;
    background: var(--dark);
    color: var(--cream);
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    margin-top: 4px;
    transition: background 0.15s;
  }
  .btn:hover { background: #333; }

  .search-wrap { margin-bottom: 1rem; position: relative; }
  .search-wrap input { padding-left: 36px; }
  .search-icon {
    position: absolute; left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted); font-size: 1rem;
  }

  .admin-item {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.25rem;
    margin-bottom: 8px;
    display: flex;
    gap: 1rem;
    align-items: flex-start;
  }
  .admin-item.low-stock { border-color: rgba(196,151,58,0.6); }
  .admin-item.no-stock  { opacity: 0.5; }

  .item-info { flex: 1; min-width: 0; }
  .item-name {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 400;
    margin-bottom: 4px;
  }
  .item-desc {
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 6px;
    font-weight: 300;
  }
  .item-meta { font-size: 0.75rem; color: var(--muted); display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .sweet-pill { padding: 2px 8px; border-radius: 99px; font-size: 0.7rem; font-weight: 500; }
  .sweet-dry      { background:#EBF3FA; color:#2A5F8A; }
  .sweet-semidry  { background:#EAF4E5; color:#2A6B35; }
  .sweet-semisweet{ background:#FEF5E6; color:#8A5A1A; }
  .sweet-sweet    { background:#FDEEF4; color:#8A2A55; }

  .item-controls { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; min-width: 100px; }
  .item-price { font-size: 1.1rem; font-weight: 500; color: var(--gold); }
  .qty-row { display: flex; align-items: center; gap: 8px; }
  .qty-btn {
    width: 30px; height: 30px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--cream);
    color: var(--dark);
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.1s;
  }
  .qty-btn:hover { background: var(--border); }
  .qty-num { font-size: 1rem; font-weight: 500; min-width: 24px; text-align: center; }
  .qty-num.danger { color: var(--danger); }
  .delete-btn {
    background: none; border: none; cursor: pointer;
    color: var(--danger); font-size: 0.75rem;
    padding: 2px 6px; border-radius: 6px;
    transition: background 0.15s;
  }
  .delete-btn:hover { background: #FAEBEB; }

  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%);
    background: var(--dark); color: var(--cream);
    padding: 10px 20px; border-radius: 10px;
    font-size: 0.875rem; opacity: 0;
    transition: opacity 0.25s; pointer-events: none; z-index: 999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  .view-link {
    display: inline-flex; align-items: center; gap: 6px;
    text-decoration: none;
    font-size: 0.8rem; color: var(--gold);
    border: 1px solid var(--border);
    padding: 6px 14px; border-radius: 99px;
    transition: background 0.15s;
  }
  .view-link:hover { background: rgba(196,151,58,0.08); }

  .empty { text-align: center; padding: 3rem; color: var(--muted); font-style: italic; }

  @media (max-width: 500px) {
    .form-grid { grid-template-columns: 1fr 1fr; }
    .form-grid > *:last-child { grid-column: 1/-1; }
    .stats .stat-num { font-size: 1.5rem; }
  }
</style>
</head>
<body>

<header>
  <h1>🍾 Управление холодильником</h1>
  <a href="index.html" class="view-link" target="_blank">Меню ↗</a>
</header>

<div class="stats">
  <div class="stat"><div class="stat-num" id="s-total">0</div><div class="stat-label">Позиций</div></div>
  <div class="stat"><div class="stat-num" id="s-qty">0</div><div class="stat-label">Всего штук</div></div>
  <div class="stat"><div class="stat-num" id="s-low">0</div><div class="stat-label">Заканчивается</div></div>
</div>

<main>
  <div class="add-form">
    <h2>+ Добавить напиток</h2>
    <div class="form-grid">
      <input id="f-name"     placeholder="Название" />
      <input id="f-price"    placeholder="Цена (₽)" type="number" min="0" />
      <input id="f-qty"      placeholder="Количество" type="number" min="0" />
    </div>
    <div class="form-grid-2">
      <input id="f-country"  placeholder="Страна / регион" />
      <input id="f-producer" placeholder="Производитель" />
    </div>
    <div style="margin-bottom:8px">
      <select id="f-sweet">
        <option value="">— Сладость —</option>
        <option value="dry">Сухой</option>
        <option value="semidry">Полусухой</option>
        <option value="semisweet">Полусладкий</option>
        <option value="sweet">Сладкий</option>
      </select>
    </div>
    <div style="margin-bottom:8px">
      <textarea id="f-desc" placeholder="Описание: вкус, аромат, история, способ производства, крепость..."></textarea>
    </div>
    <button class="btn" onclick="addDrink()">Добавить позицию</button>
  </div>

  <div class="section-label">Напитки в холодильнике</div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input placeholder="Поиск по названию..." oninput="renderAdmin(this.value)" />
  </div>
  <div id="admin-list"></div>
</main>

<div class="toast" id="toast"></div>

<script>
const sweetLabels = { dry:'Сухой', semidry:'Полусухой', semisweet:'Полусладкий', sweet:'Сладкий' };
const sweetClass  = { dry:'sweet-dry', semidry:'sweet-semidry', semisweet:'sweet-semisweet', sweet:'sweet-sweet' };
let nextId = 100;

function load() {
  try {
    const d = JSON.parse(localStorage.getItem('cider_drinks') || 'null');
    return d || getDefaults();
  } catch(e) { return getDefaults(); }
}

function save(drinks) {
  localStorage.setItem('cider_drinks', JSON.stringify(drinks));
}

function getDefaults() {
  return [
    { id:1, name:'Cidre Brut — Eric Bordelet', price:380, qty:8, country:'Франция, Нормандия', producer:'Eric Bordelet', sweet:'dry', desc:'Классический нормандский сидр из яблок сорта Bedan и Frequin Rouge. Выдержан на осадке 6 месяцев. Во вкусе — зелёное яблоко, лимон, лёгкая терпкость. Алкоголь 5%.' },
    { id:2, name:'Asturian Gold — El Gaitero', price:290, qty:5, country:'Испания, Астурия', producer:'El Gaitero', sweet:'semidry', desc:'Игристый сидр из астурийских яблок. Традиционный метод производства с бутылочным брожением. Золотистый цвет, аромат спелой груши и мёда. Алкоголь 6%.' },
    { id:3, name:'Somerset Rosé — Burrow Hill', price:340, qty:3, country:'Англия, Сомерсет', producer:'Burrow Hill', sweet:'semisweet', desc:'Розовый сидр из смеси красных яблок. Мягкий, фруктовый, с нотами малины и земляники. Идеален как аперитив. Алкоголь 4.5%.' },
    { id:4, name:"Keeved Cider — Oliver's", price:420, qty:2, country:'Англия, Херефордшир', producer:"Oliver's", sweet:'sweet', desc:'Редкий кивированный сидр — натуральная сладость без добавления сахара. Метод кивинга сохраняет природные сахара через прерывание брожения. Нотки карамели и ванили. Алкоголь 3.5%.' },
    { id:5, name:'Somersby Apple', price:180, qty:12, country:'Дания', producer:'Somersby', sweet:'semisweet', desc:'Лёгкий освежающий сидр из концентрата яблочного сока. Мягкий вкус, умеренная газация. Популярный выбор. Алкоголь 4.5%.' },
    { id:6, name:'Poire Authentique — Dupont', price:360, qty:0, country:'Франция, Нормандия', producer:'Dupont', sweet:'semidry', desc:'Грушевый сидр (пуаре) из сорта Domaine de Kerne. Очень деликатный, с тонким ароматом белой груши и цветов. Алкоголь 3%.' },
  ];
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function updateStats() {
  const drinks = load();
  document.getElementById('s-total').textContent = drinks.length;
  document.getElementById('s-qty').textContent = drinks.reduce((s,d)=>s+d.qty,0);
  document.getElementById('s-low').textContent = drinks.filter(d=>d.qty>0&&d.qty<=3).length;
}

function renderAdmin(search='') {
  const drinks = load();
  const list = document.getElementById('admin-list');
  const f = drinks.filter(d => d.name.toLowerCase().includes(search.toLowerCase()));
  if (!f.length) { list.innerHTML = '<div class="empty">Ничего не найдено</div>'; updateStats(); return; }

  list.innerHTML = f.map(d => `
    <div class="admin-item ${d.qty===0?'no-stock':d.qty<=3?'low-stock':''}">
      <div class="item-info">
        <div class="item-name">${d.name}</div>
        ${d.desc?`<div class="item-desc">${d.desc}</div>`:''}
        <div class="item-meta">
          ${d.country?`📍 ${d.country}`:''}
          ${d.producer?`· ${d.producer}`:''}
          ${d.sweet?`<span class="sweet-pill ${sweetClass[d.sweet]}">${sweetLabels[d.sweet]}</span>`:''}
        </div>
      </div>
      <div class="item-controls">
        <div class="item-price">${d.price} ₽</div>
        <div class="qty-row">
          <button class="qty-btn" onclick="changeQty(${d.id},-1)">−</button>
          <span class="qty-num ${d.qty<=2?'danger':''}">${d.qty}</span>
          <button class="qty-btn" onclick="changeQty(${d.id},1)">+</button>
        </div>
        <button class="delete-btn" onclick="deleteDrink(${d.id})">✕ удалить</button>
      </div>
    </div>`).join('');
  updateStats();
}

function changeQty(id, delta) {
  const drinks = load();
  const d = drinks.find(x=>x.id===id);
  if (!d) return;
  d.qty = Math.max(0, d.qty+delta);
  save(drinks);
  renderAdmin(document.querySelector('input[placeholder*="Поиск"]').value);
}

function deleteDrink(id) {
  if (!confirm('Удалить эту позицию?')) return;
  const drinks = load().filter(x=>x.id!==id);
  save(drinks);
  renderAdmin(document.querySelector('input[placeholder*="Поиск"]').value);
  toast('Позиция удалена');
}

function addDrink() {
  const name     = document.getElementById('f-name').value.trim();
  const price    = parseInt(document.getElementById('f-price').value);
  const qty      = parseInt(document.getElementById('f-qty').value);
  const country  = document.getElementById('f-country').value.trim();
  const producer = document.getElementById('f-producer').value.trim();
  const sweet    = document.getElementById('f-sweet').value;
  const desc     = document.getElementById('f-desc').value.trim();

  if (!name || isNaN(price) || isNaN(qty)) { toast('⚠️ Заполните название, цену и количество'); return; }

  const drinks = load();
  drinks.push({ id: nextId++, name, price, qty, country, producer, sweet, desc });
  save(drinks);

  ['f-name','f-price','f-qty','f-country','f-producer','f-desc'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-sweet').value='';
  renderAdmin();
  toast('✓ Напиток добавлен');
}

renderAdmin();
</script>
</body>
</html>
